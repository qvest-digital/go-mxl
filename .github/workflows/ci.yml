name: ci

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  # Compute image registry references and tag list once so per-arch
  # build jobs and the manifest-merge job agree on what to publish.
  meta:
    runs-on: ubuntu-24.04
    outputs:
      builder: ${{ steps.m.outputs.builder }}
      runtime: ${{ steps.m.outputs.runtime }}
      builder_tags: ${{ steps.m.outputs.builder_tags }}
      runtime_tags: ${{ steps.m.outputs.runtime_tags }}
      libmxl_url: ${{ steps.m.outputs.libmxl_url }}
      libmxl_ref: ${{ steps.m.outputs.libmxl_ref }}
      push: ${{ steps.m.outputs.push }}
    steps:
      - uses: actions/checkout@v6

      - id: m
        run: |
          set -eu
          # The pin file holds https://github.com/<owner>/<repo>/tree/<ref>.
          # Pass the URL through verbatim as a build arg and derive the
          # short ref for the content-addressed image tag.
          libmxl_url=$(tr -d '[:space:]' < .github/libmxl.version)
          libmxl_ref=${libmxl_url##*/tree/}
          libmxl_short=${libmxl_ref:0:7}

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          builder=ghcr.io/${owner}/go-mxl-builder
          runtime=ghcr.io/${owner}/go-mxl-runtime
          builder_tags="${builder}:libmxl-${libmxl_short}"
          runtime_tags="${runtime}:libmxl-${libmxl_short}"
          push=false
          version=""
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            push=true
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              # A vX.Y.Z tag push. release-please cuts these when its
              # release PR merges; because release-please.yml runs the
              # action under RELEASE_PLEASE_TOKEN (a PAT), the tag push
              # starts this run. Hand-pushed tags land here too. Either
              # way the version is the tag itself.
              version=${GITHUB_REF_NAME#v}
            else
              # Push to main. `:dev` always tracks main's HEAD. A
              # release commit's versioned images are published by the
              # separate tag-triggered run above, not from here.
              builder_tags="${builder_tags},${builder}:dev"
              runtime_tags="${runtime_tags},${runtime}:dev"
            fi
            if [ -n "$version" ]; then
              builder_tags="${builder_tags},${builder}:${version}"
              runtime_tags="${runtime_tags},${runtime}:${version}"
              # SemVer prerelease identifiers come after a '-'. Stable
              # releases get `:latest`; prereleases get `:pre` so that
              # `:latest` never floats to an unstable build.
              case "$version" in
                *-*)
                  builder_tags="${builder_tags},${builder}:pre"
                  runtime_tags="${runtime_tags},${runtime}:pre"
                  ;;
                *)
                  builder_tags="${builder_tags},${builder}:latest"
                  runtime_tags="${runtime_tags},${runtime}:latest"
                  ;;
              esac
            fi
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ] \
              && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            push=true
          fi

          {
            echo "builder=${builder}"
            echo "runtime=${runtime}"
            echo "builder_tags=${builder_tags}"
            echo "runtime_tags=${runtime_tags}"
            echo "libmxl_url=${libmxl_url}"
            echo "libmxl_ref=${libmxl_ref}"
            echo "push=${push}"
          } >> "$GITHUB_OUTPUT"

  # Per-arch native build on the matching runner. Each entry pushes a
  # per-digest image (no tag) and uploads its digest as an artifact so
  # the merge job can stitch them into a single multi-arch manifest
  # list per tag. Tests run inside the locally-loaded builder image so
  # arm64 actually exercises arm64 binaries.
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs_on: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runs_on: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.meta.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always load the builder image locally so the test step below
      # has something to `docker run`. Tests run on the matrix's native
      # arch, so on `ubuntu-24.04-arm` they exercise the linux/arm64
      # libmxl build end-to-end.
      - name: Build builder (local load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          platforms: ${{ matrix.platform }}
          load: true
          tags: local/go-mxl-builder
          build-args: |
            LIBMXL_VERSION=${{ needs.meta.outputs.libmxl_url }}
          cache-from: |
            type=gha,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,scope=builder-${{ matrix.arch }}
          cache-to: |
            type=gha,mode=max,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,mode=max,scope=builder-${{ matrix.arch }}

      - name: gofmt / vet / build / test
        run: |
          docker run --rm \
            --tmpfs /dev/shm:rw,nosuid,size=512m \
            -v "$PWD:/src" -w /src \
            -e GOCACHE=/tmp/gocache -e GOMODCACHE=/tmp/gomodcache \
            local/go-mxl-builder \
            bash -ec '
              out=$(gofmt -l .)
              if [ -n "$out" ]; then
                echo "Files need gofmt:"
                echo "$out"
                exit 1
              fi
              go vet ./...
              for pkg in $(go list ./...); do
                echo "Building: $pkg"
                go build -o /dev/null "$pkg"
              done
              go test -count=1 ./...
              go test -count=1 -tags=mxl_integration ./...
            '

      # Confirm the builder image carries an EFA-capable libfabric
      # (>=2.4, not Debian's 2.1) and that the full provider matrix is
      # compiled in. Providers register unconditionally on a libfabric
      # build that has them compiled in, so all five appear on a
      # vanilla GitHub runner with no EFA / no IB / no mlx5 device.
      # The final ls check asserts that rdma-core's libibverbs.d/ tree
      # landed inside the /opt/libfabric prefix with at least one
      # .driver entry; without it the verbs provider returns
      # -FI_ENODATA at runtime even though `fi_info -l` shows it
      # registered.
      - name: EFA smoke (builder)
        run: |
          docker run --rm local/go-mxl-builder bash -ec '
            pkg-config --modversion libfabric | grep -E "^2\.[4-9]|^[3-9]"
            for p in efa verbs tcp udp shm; do
              fi_info -l | grep -qE "^${p}:" \
                || { echo "missing provider: $p"; fi_info -l; exit 1; }
            done
            test -e /opt/libfabric/lib/libfabric.so.1
            ls /opt/libfabric/etc/libibverbs.d/*.driver >/dev/null \
              || { echo "libibverbs.d empty or missing"; ls -la /opt/libfabric/etc/libibverbs.d/ 2>&1; exit 1; }
          '

      # Build the runtime image locally so the runtime EFA smoke
      # below has something to `docker run`. The push-by-digest step
      # further down reuses the same gha cache so it stays near-
      # instant.
      - name: Build runtime (local load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          platforms: ${{ matrix.platform }}
          load: true
          tags: local/go-mxl-runtime
          build-args: |
            LIBMXL_VERSION=${{ needs.meta.outputs.libmxl_url }}
          cache-from: |
            type=gha,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,scope=runtime-${{ matrix.arch }}
          cache-to: |
            type=gha,mode=max,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,mode=max,scope=runtime-${{ matrix.arch }}

      # The runtime image has no fi_info (the bin/ tools live only in
      # the builder), so the smoke confirms the EFA-capable libfabric
      # is in place by checking that ldconfig resolves libfabric.so.1
      # out of /opt/libfabric/lib. The libibverbs.d/ check guards
      # against the .driver files being absent on the runtime side: a
      # registered-but-empty verbs provider returns -FI_ENODATA on
      # real hardware and `fi_info -p verbs` on a runner without
      # devices is ambiguous, so the discriminator is whether the
      # config dir is populated.
      - name: EFA smoke (runtime)
        run: |
          docker run --rm local/go-mxl-runtime bash -ec '
            ldconfig -p | grep -q "/opt/libfabric/lib/libfabric.so.1"
            ls /opt/libfabric/etc/libibverbs.d/*.driver >/dev/null \
              || { echo "libibverbs.d empty or missing"; ls -la /opt/libfabric/etc/libibverbs.d/ 2>&1; exit 1; }
          '

      # Re-run the builder build with push-by-digest output so the
      # registry gets a per-arch image identified only by digest. The
      # gha cache from the load step above keeps this near-instant.
      - name: Push builder by digest
        if: needs.meta.outputs.push == 'true'
        id: builder_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ needs.meta.outputs.builder }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            LIBMXL_VERSION=${{ needs.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ needs.meta.outputs.libmxl_ref }}
          cache-from: |
            type=gha,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,scope=builder-${{ matrix.arch }}

      - name: Push runtime by digest
        if: needs.meta.outputs.push == 'true'
        id: runtime_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ needs.meta.outputs.runtime }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            LIBMXL_VERSION=${{ needs.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ needs.meta.outputs.libmxl_ref }}
          cache-from: |
            type=gha,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,scope=runtime-${{ matrix.arch }}
          cache-to: |
            type=gha,mode=max,scope=libfabric-stack-${{ matrix.arch }}
            type=gha,mode=max,scope=runtime-${{ matrix.arch }}

      - name: Export digests
        if: needs.meta.outputs.push == 'true'
        run: |
          set -eu
          mkdir -p "${RUNNER_TEMP}/digests/builder" "${RUNNER_TEMP}/digests/runtime"
          bd="${{ steps.builder_push.outputs.digest }}"
          rd="${{ steps.runtime_push.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/builder/${bd#sha256:}"
          touch "${RUNNER_TEMP}/digests/runtime/${rd#sha256:}"

      - name: Upload digests
        if: needs.meta.outputs.push == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into one multi-arch manifest list per
  # tag, for both the builder and runtime images.
  merge:
    needs: [meta, build]
    if: needs.meta.outputs.push == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          # Keep one subdirectory per uploaded artifact so the per-arch
          # builder/{,runtime} subtrees don't collide.
          merge-multiple: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest lists
        env:
          BUILDER: ${{ needs.meta.outputs.builder }}
          RUNTIME: ${{ needs.meta.outputs.runtime }}
          BUILDER_TAGS: ${{ needs.meta.outputs.builder_tags }}
          RUNTIME_TAGS: ${{ needs.meta.outputs.runtime_tags }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          # Layout: digests-amd64/{builder,runtime}/<digest>, same for arm64.
          create_manifest() {
            local image=$1 tags_csv=$2 subdir=$3
            local tag_args=""
            local IFS=,
            for t in $tags_csv; do tag_args="$tag_args -t $t"; done
            unset IFS
            local refs=""
            for f in digests-*/"$subdir"/*; do
              digest=$(basename "$f")
              refs="$refs ${image}@sha256:${digest}"
            done
            echo "creating $image manifest with tags:$tag_args" >&2
            # shellcheck disable=SC2086
            docker buildx imagetools create $tag_args $refs
          }
          create_manifest "$BUILDER" "$BUILDER_TAGS" builder
          create_manifest "$RUNTIME" "$RUNTIME_TAGS" runtime

      - name: Inspect builder manifest
        run: docker buildx imagetools inspect "$(echo '${{ needs.meta.outputs.builder_tags }}' | cut -d, -f1)"
