name: ci

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          set -eu
          # The pin file holds https://github.com/<owner>/<repo>/tree/<ref>.
          # Pass the URL through verbatim as a build arg, and derive the
          # short ref for the content-addressed image tag (`libmxl-<sha>`)
          # so the image identity tracks the libmxl revision rather than
          # the go-mxl commit that built it.
          libmxl_url=$(tr -d '[:space:]' < .github/libmxl.version)
          libmxl_ref=${libmxl_url##*/tree/}
          libmxl_short=${libmxl_ref:0:7}

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          builder=ghcr.io/${owner}/go-mxl-builder
          runtime=ghcr.io/${owner}/go-mxl-runtime
          builder_image="${builder}:libmxl-${libmxl_short}"
          runtime_image="${runtime}:libmxl-${libmxl_short}"

          # `push` gates registry writes. Floating tags (`:dev`, `:latest`,
          # `:pre`, `:<version>`) are reserved for push events on main /
          # release tags so PR runs cannot clobber them. PR runs from
          # the same repo still publish the content-addressed
          # `:libmxl-<sha>` tag so `ci.yml` (and downstream consumers)
          # can pull the exact image the PR builds. PRs from forks get
          # a read-only token and skip the push entirely.
          builder_tags="${builder_image}"
          runtime_tags="${runtime_image}"
          push=false
          version=""
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            push=true
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              # Manual tag push. (release-please tags are created with
              # GITHUB_TOKEN and never reach this branch.)
              version=${GITHUB_REF_NAME#v}
            else
              # Push to main. `:dev` always tracks main's HEAD, even
              # when this same commit is also a release commit.
              builder_tags="${builder_tags},${builder}:dev"
              runtime_tags="${runtime_tags},${runtime}:dev"
              # release-please.yml runs in parallel and may be tagging
              # this same SHA. Use the merge commit subject as a cheap
              # filter, then poll for the tag itself so the version
              # comes from a real git tag — not from parsing a commit
              # message.
              case "$(git log -1 --pretty=%s)" in
                "chore(main): release "*)
                  for _ in $(seq 1 24); do
                    git fetch --tags --quiet origin || true
                    tag=$(git tag --points-at HEAD --list 'v*' | head -1)
                    if [ -n "$tag" ]; then
                      version=${tag#v}
                      break
                    fi
                    sleep 5
                  done
                  ;;
              esac
            fi
            if [ -n "$version" ]; then
              builder_tags="${builder_tags},${builder}:${version}"
              runtime_tags="${runtime_tags},${runtime}:${version}"
              # SemVer prerelease identifiers come after a '-'. Stable
              # releases get `:latest`; prereleases get `:pre` so that
              # `:latest` never floats to an unstable build.
              case "$version" in
                *-*)
                  builder_tags="${builder_tags},${builder}:pre"
                  runtime_tags="${runtime_tags},${runtime}:pre"
                  ;;
                *)
                  builder_tags="${builder_tags},${builder}:latest"
                  runtime_tags="${runtime_tags},${runtime}:latest"
                  ;;
              esac
            fi
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ] \
              && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            push=true
          fi

          {
            echo "libmxl_url=${libmxl_url}"
            echo "libmxl_ref=${libmxl_ref}"
            echo "builder_image=${builder_image}"
            echo "builder_tags=${builder_tags}"
            echo "runtime_tags=${runtime_tags}"
            echo "push=${push}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `load: true` puts the image into the runner's docker daemon so
      # the gofmt/vet/build step below can `docker run` it without a
      # registry round-trip — and crucially, lets fork PRs (which cannot
      # push) still exercise the Go toolchain against the freshly-built
      # libmxl.
      - name: Build builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          load: true
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.builder_tags }}
          build-args: |
            LIBMXL_VERSION=${{ steps.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ steps.meta.outputs.libmxl_ref }}
          cache-from: type=gha,scope=go-mxl-images
          cache-to: type=gha,mode=max,scope=go-mxl-images

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.runtime_tags }}
          build-args: |
            LIBMXL_VERSION=${{ steps.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ steps.meta.outputs.libmxl_ref }}
          cache-from: type=gha,scope=go-mxl-images
          cache-to: type=gha,mode=max,scope=go-mxl-images

      - name: gofmt / vet / build / test
        run: |
          docker run --rm \
            --tmpfs /dev/shm:rw,nosuid,size=512m \
            -v "$PWD:/src" -w /src \
            -e GOCACHE=/tmp/gocache -e GOMODCACHE=/tmp/gomodcache \
            "${{ steps.meta.outputs.builder_image }}" \
            bash -ec '
              out=$(gofmt -l .)
              if [ -n "$out" ]; then
                echo "Files need gofmt:"
                echo "$out"
                exit 1
              fi
              go vet ./...
              # Build every package, including each examples/<name>/main.go,
              # under its own go list entry so a broken main shows up with a
              # clear per-package error. -o /dev/null keeps the workspace
              # clean across iterations.
              for pkg in $(go list ./...); do
                echo "Building: $pkg"
                go build -o /dev/null "$pkg"
              done
              go test -count=1 ./...
              go test -count=1 -tags=mxl_integration ./...
            '

  # Native build on Apple Silicon. libmxl ships a Darwin-Clang preset
  # and brew has every transitive dep (cmake, ninja, libfabric, vcpkg
  # ports for spdlog/fmt). No docker image is published from this job
  # — go-mxl is consumed as a Go module on macOS, not as an image.
  macos:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Read libmxl pin
        id: pin
        run: |
          set -eu
          libmxl_url=$(tr -d '[:space:]' < .github/libmxl.version)
          rest=${libmxl_url#https://github.com/}
          repo=${rest%%/tree/*}
          ref=${rest#*/tree/}
          {
            echo "clone_url=https://github.com/$repo.git"
            echo "ref=$ref"
          } >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          # gstreamer covers libmxl's bundled gst-* tools (same role as
          # libgstreamer1.0-dev / libgstreamer-plugins-base1.0-dev on
          # the Linux builder image).
          brew install --quiet cmake ninja pkg-config libfabric gstreamer

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            ~/.cache/vcpkg/archives
          key: vcpkg-macos-arm-${{ hashFiles('.github/libmxl.version') }}

      # See ci.yml's Linux path for the rationale behind --filter=tree:0
      # vs --depth=1 and pinning vcpkg at $HOME/vcpkg.
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x ~/vcpkg/vcpkg ]; then
            rm -rf ~/vcpkg
            git clone --filter=tree:0 https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Build and install libmxl
        run: |
          set -euo pipefail
          git clone "${{ steps.pin.outputs.clone_url }}" /tmp/mxl
          git -C /tmp/mxl checkout "${{ steps.pin.outputs.ref }}"
          sudo mkdir -p /opt/libmxl
          sudo chown -R "$USER" /opt/libmxl
          cd /tmp/mxl
          # The clang preset hard-codes CMAKE_LINKER_TYPE=LLD; macOS's
          # Xcode toolchain ships its own linker (ld64), so override
          # back to SYSTEM. BUILD_DOCS=OFF / fabrics-OFI on for parity
          # with the Linux image.
          cmake --preset Darwin-Clang-Release \
                -DBUILD_DOCS=OFF \
                -DMXL_ENABLE_FABRICS_OFI=ON \
                -DCMAKE_LINKER_TYPE=SYSTEM \
                -DCMAKE_INSTALL_PREFIX=/opt/libmxl
          cmake --build build/Darwin-Clang-Release
          cmake --install build/Darwin-Clang-Release
          # vcpkg's spdlog.pc / fmt.pc stay in the build tree; copy
          # them next to libmxl.pc so pkg-config resolves them off a
          # single PKG_CONFIG_PATH entry. (Same dance as the Linux
          # builder image.)
          cp build/Darwin-Clang-Release/vcpkg_installed/arm64-osx/lib/pkgconfig/*.pc \
             /opt/libmxl/lib/pkgconfig/

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Mark workspace as safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: gofmt / vet / build / test
        env:
          # libmxl.pc and the copied spdlog.pc/fmt.pc all live here.
          PKG_CONFIG_PATH: /opt/libmxl/lib/pkgconfig
          # macOS's dynamic linker uses DYLD_LIBRARY_PATH, not
          # LD_LIBRARY_PATH.
          DYLD_LIBRARY_PATH: /opt/libmxl/lib
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi
          go vet ./...
          for pkg in $(go list ./...); do
            echo "Building: $pkg"
            go build -o /dev/null "$pkg"
          done
          # Unit tests only — the mxl_integration suite needs a tmpfs
          # /dev/shm which macOS doesn't ship by default.
          go test -count=1 ./...
