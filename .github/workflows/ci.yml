name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    # libmxl-fabrics uses fi_fabric2, which lands in libfabric 2.x.
    # Ubuntu 24.04 only ships libfabric 1.17 via apt; Debian trixie
    # ships 2.1, matching what dmf-mxl/mxl builds against upstream.
    container:
      image: debian:trixie-20260505
    timeout-minutes: 30

    steps:
      # actions/checkout shells out to git; minimal Debian images don't
      # ship it, so install it (and CA roots for HTTPS) before anything
      # else. The rest of the build deps land in a later step.
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git

      - uses: actions/checkout@v4

      - name: Read libmxl pin
        id: libmxl
        run: |
          # .github/libmxl.version holds a github.com/<owner>/<repo>/tree/<ref>
          # URL; <ref> may be a tag, branch, or SHA on the upstream repo or
          # any fork. Split it into the clone URL and the ref.
          url=$(tr -d '[:space:]' < .github/libmxl.version)
          rest=${url#https://github.com/}
          repo=${rest%%/tree/*}
          ref=${rest#*/tree/}
          if [ "$rest" = "$ref" ] || [ -z "$repo" ] || [ -z "$ref" ]; then
            echo "::error file=.github/libmxl.version::expected https://github.com/<owner>/<repo>/tree/<ref>, got: $url"
            exit 1
          fi
          echo "clone_url=https://github.com/$repo.git" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build clang-19 lld-19 \
            pkg-config bison flex curl zip unzip tar \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libfabric-dev libfabric-bin
          # Trixie installs versioned clang-19/lld-19 only. The
          # libmxl CMake preset references unversioned `clang`,
          # `clang++`, and (via CMAKE_LINKER_TYPE=LLD) `ld.lld`.
          # Provide them in /usr/local/bin (ahead of /usr/bin in PATH).
          ln -sf /usr/bin/clang-19 /usr/local/bin/clang
          ln -sf /usr/bin/clang++-19 /usr/local/bin/clang++
          ln -sf /usr/bin/ld.lld-19 /usr/local/bin/ld.lld

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            ~/.cache/vcpkg/archives
          key: vcpkg-debian-trixie-${{ hashFiles('.github/libmxl.version') }}

      - name: Bootstrap vcpkg
        run: |
          if [ ! -x ~/vcpkg/vcpkg ]; then
            rm -rf ~/vcpkg
            # `--filter=tree:0` keeps the clone small but still lets `git show`
            # resolve the `builtin-baseline` commit referenced in libmxl's
            # vcpkg.json. A plain `--depth 1` clone breaks vcpkg's baseline
            # checkout.
            git clone --filter=tree:0 https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Build and install libmxl
        run: |
          set -euo pipefail
          git clone "${{ steps.libmxl.outputs.clone_url }}" /tmp/mxl
          git -C /tmp/mxl checkout "${{ steps.libmxl.outputs.ref }}"
          cd /tmp/mxl
          # CMAKE_INSTALL_PREFIX must be set at configure time so libmxl.pc
          # ships with absolute paths under /opt/libmxl. Passing only
          # `cmake --install --prefix` would put files there but leave the
          # .pc paths pointing at the preset's default install dir.
          cmake --preset Linux-Clang-Release \
                -DBUILD_DOCS=OFF \
                -DMXL_ENABLE_FABRICS_OFI=ON \
                -DCMAKE_INSTALL_PREFIX=/opt/libmxl
          cmake --build build/Linux-Clang-Release
          cmake --install build/Linux-Clang-Release

      - name: Expose libmxl to subsequent steps
        run: |
          # libmxl.pc / libmxl-fabrics.pc carry `Requires.private: spdlog`
          # (and fmt), but `cmake --install` only puts libmxl's own .pc
          # files under /opt/libmxl. vcpkg's spdlog.pc / fmt.pc stay in
          # the build tree at build/<preset>/vcpkg_installed/<triplet>/
          # lib/pkgconfig — add that to PKG_CONFIG_PATH so pkg-config
          # can resolve the private deps without us having to edit the
          # installed .pc files. spdlog and fmt are statically linked
          # into libmxl{,-fabrics}.so, so runtime needs nothing extra.
          {
            echo "PKG_CONFIG_PATH=/opt/libmxl/lib/pkgconfig:/tmp/mxl/build/Linux-Clang-Release/vcpkg_installed/x64-linux/lib/pkgconfig"
            echo "LD_LIBRARY_PATH=/opt/libmxl/lib"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      # `go build` embeds VCS info by running `git status` in the
      # workspace. Containerized jobs run as root against a checkout
      # owned by the runner uid, so git refuses with "safe.directory"
      # unless we whitelist it explicitly.
      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...
