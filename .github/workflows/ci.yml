name: ci

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          set -eu
          # The pin file holds https://github.com/<owner>/<repo>/tree/<ref>.
          # Pass the URL through verbatim as a build arg, and derive the
          # short ref for the content-addressed image tag (`libmxl-<sha>`)
          # so the image identity tracks the libmxl revision rather than
          # the go-mxl commit that built it.
          libmxl_url=$(tr -d '[:space:]' < .github/libmxl.version)
          libmxl_ref=${libmxl_url##*/tree/}
          libmxl_short=${libmxl_ref:0:7}

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          builder=ghcr.io/${owner}/go-mxl-builder
          runtime=ghcr.io/${owner}/go-mxl-runtime
          builder_image="${builder}:libmxl-${libmxl_short}"
          runtime_image="${runtime}:libmxl-${libmxl_short}"

          # `push` gates registry writes. Floating tags (`:dev`, `:latest`,
          # `:<version>`) are reserved for push events on main / release
          # tags so PR runs cannot clobber them. PR runs from the same
          # repo still publish the content-addressed `:libmxl-<sha>` tag
          # so `ci.yml` (and downstream consumers) can pull the exact
          # image the PR builds. PRs from forks get a read-only token
          # and skip the push entirely.
          builder_tags="${builder_image}"
          runtime_tags="${runtime_image}"
          push=false
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            push=true
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              version=${GITHUB_REF_NAME#v}
              builder_tags="${builder_tags},${builder}:${version},${builder}:latest"
              runtime_tags="${runtime_tags},${runtime}:${version},${runtime}:latest"
            else
              builder_tags="${builder_tags},${builder}:dev"
              runtime_tags="${runtime_tags},${runtime}:dev"
            fi
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ] \
              && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            push=true
          fi

          {
            echo "libmxl_url=${libmxl_url}"
            echo "libmxl_ref=${libmxl_ref}"
            echo "builder_image=${builder_image}"
            echo "builder_tags=${builder_tags}"
            echo "runtime_tags=${runtime_tags}"
            echo "push=${push}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `load: true` puts the image into the runner's docker daemon so
      # the gofmt/vet/build step below can `docker run` it without a
      # registry round-trip — and crucially, lets fork PRs (which cannot
      # push) still exercise the Go toolchain against the freshly-built
      # libmxl.
      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          load: true
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.builder_tags }}
          build-args: |
            LIBMXL_VERSION=${{ steps.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ steps.meta.outputs.libmxl_ref }}
          cache-from: type=gha,scope=go-mxl-images
          cache-to: type=gha,mode=max,scope=go-mxl-images

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.runtime_tags }}
          build-args: |
            LIBMXL_VERSION=${{ steps.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ steps.meta.outputs.libmxl_ref }}
          cache-from: type=gha,scope=go-mxl-images
          cache-to: type=gha,mode=max,scope=go-mxl-images

      - name: gofmt / go vet / go build
        run: |
          docker run --rm \
            -v "$PWD:/src" -w /src \
            -e GOCACHE=/tmp/gocache -e GOMODCACHE=/tmp/gomodcache \
            "${{ steps.meta.outputs.builder_image }}" \
            bash -ec '
              out=$(gofmt -l .)
              if [ -n "$out" ]; then
                echo "Files need gofmt:"
                echo "$out"
                exit 1
              fi
              go vet ./...
              go build ./...
            '
