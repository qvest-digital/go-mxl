name: docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          set -eu
          # The pin file holds https://github.com/<owner>/<repo>/tree/<ref>;
          # pass it through verbatim as a build arg, and extract the
          # short ref for an additional, content-addressed tag so
          # downstream can pin precisely (e.g. :libmxl-5f01b37).
          libmxl_url=$(tr -d '[:space:]' < .github/libmxl.version)
          libmxl_ref=${libmxl_url##*/tree/}
          libmxl_short=${libmxl_ref:0:7}

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          builder=ghcr.io/${owner}/go-mxl-builder
          runtime=ghcr.io/${owner}/go-mxl-runtime

          builder_tags="${builder}:libmxl-${libmxl_short}"
          runtime_tags="${runtime}:libmxl-${libmxl_short}"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version=${GITHUB_REF_NAME#v}
            builder_tags="${builder_tags},${builder}:${version},${builder}:latest"
            runtime_tags="${runtime_tags},${runtime}:${version},${runtime}:latest"
          else
            builder_tags="${builder_tags},${builder}:dev"
            runtime_tags="${runtime_tags},${runtime}:dev"
          fi

          {
            echo "libmxl_url=${libmxl_url}"
            echo "libmxl_ref=${libmxl_ref}"
            echo "builder_tags=${builder_tags}"
            echo "runtime_tags=${runtime_tags}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the builder image first. The runtime build
      # depends on the same builder stage; running them in sequence on
      # one buildx instance lets the second step reuse the local
      # buildkit cache for free, on top of the gha cache.
      - name: Build & push builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          push: true
          tags: ${{ steps.meta.outputs.builder_tags }}
          build-args: |
            LIBMXL_VERSION=${{ steps.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ steps.meta.outputs.libmxl_ref }}
          cache-from: type=gha,scope=go-mxl-images
          cache-to: type=gha,mode=max,scope=go-mxl-images

      - name: Build & push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.runtime_tags }}
          build-args: |
            LIBMXL_VERSION=${{ steps.meta.outputs.libmxl_url }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            io.qvest-digital.go-mxl.libmxl-ref=${{ steps.meta.outputs.libmxl_ref }}
          cache-from: type=gha,scope=go-mxl-images
          cache-to: type=gha,mode=max,scope=go-mxl-images
