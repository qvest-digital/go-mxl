name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please

jobs:
  # Every merge to main opens (or updates) a prerelease PR proposing
  # vX.Y.Z-rc.N. Merging that PR tags the prerelease.
  prerelease:
    runs-on: ubuntu-24.04
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/prerelease-config.json
          manifest-file: .github/prerelease-manifest.json

  # Once a prerelease tag exists, a second pass with the release config
  # opens a follow-up PR proposing the matching final vX.Y.Z. Merging
  # it cuts the stable release; the release config's extra-files entry
  # also syncs the prerelease manifest so subsequent rcs start from
  # the new baseline.
  release:
    runs-on: ubuntu-24.04
    needs: [prerelease]
    if: needs.prerelease.outputs.releases_created == 'true' && contains(needs.prerelease.outputs.tag_name, 'rc')
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-config.json
          manifest-file: .github/release-manifest.json
