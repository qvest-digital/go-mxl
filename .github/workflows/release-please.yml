name: release-please

on:
  push:
    branches: [main]
  # Manual escape hatch: re-run the release-please pass without
  # waiting for a new push to main. Useful when a release PR fell
  # out of sync with main and needs to be regenerated.
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please

jobs:
  # Every merge to main opens (or updates) a single release PR
  # proposing the next tag. Whether that tag is a prerelease
  # (1.0.0-rc.N) or a stable release (1.0.0) is controlled by the
  # `prerelease` flag in .github/release-please-config.json. The
  # config defaults to `prerelease: true`; cutting the first stable
  # release is the one-line edit `"prerelease": false`, the only
  # configuration change needed to graduate.
  #
  # Authenticated with RELEASE_PLEASE_TOKEN (a PAT) rather than the
  # default GITHUB_TOKEN so the tag push release-please makes on merge
  # starts the tag-triggered ci.yml run that publishes the versioned
  # images. A GITHUB_TOKEN-driven tag push starts no downstream
  # workflow, so the images would never build.
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
